TebLocalPlannerROS:

 odom_topic: odom
 map_frame: /map
    
 # Trajectory
 teb_autosize: True
 dt_ref: 0.3
 dt_hysteresis: 0.1
 global_plan_overwrite_orientation: True
 max_global_plan_lookahead_dist: 3.0
 feasibility_check_no_poses: 5
    
 # Robot
 max_vel_x: 1 # Sesuaikan dengan kecepatan maksimal robot Anda
 max_vel_x_backwards: 1 # Kecepatan mundur
 max_vel_theta: 2.75
 acc_lim_x: 10
 acc_lim_theta: 2.4
 min_turning_radius: 0.0
 footprint_model: # WAJIB disesuaikan dengan bentuk robot Anda!
   type: "polygon"
   vertices: [[-0.225, -0.225], [-0.225, 0.225], [0.225, 0.225], [0.35, 0.0], [0.225, -0.225]]

 # GoalTolerance
 xy_goal_tolerance: 0.1
 yaw_goal_tolerance: 0.1
 free_goal_vel: False
    
 # Obstacles
 min_obstacle_dist: 0.5 # SANGAT PENTING: Jarak toleransi minimum dari garis biru toska (dalam meter)
 include_costmap_obstacles: True
 costmap_obstacles_behind_robot_dist: 1.0
 obstacle_poses_affected: 30
 costmap_converter_plugin: ""
 costmap_converter_spin_thread: True
 costmap_converter_rate: 5

 # Optimization
 no_inner_iterations: 5
 no_outer_iterations: 4
 optimization_activate: True
 optimization_verbose: False
 penalty_epsilon: 0.05
 weight_max_vel_x: 2
 weight_max_vel_theta: 1
 weight_acc_lim_x: 1
 weight_acc_lim_theta: 1
 weight_kinematics_nh: 1000
 weight_kinematics_forward_drive: 1 # Ubah jadi 1000 jika TIDAK MAU robot mundur
 weight_kinematics_turning_radius: 1
 weight_optimaltime: 1
 weight_obstacle: 50 # Tingkatkan jika robot masih sering menabrak biru toska
 weight_dynamic_obstacle: 10 # not in use yet
